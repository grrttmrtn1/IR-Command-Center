services:
  nginx:
    ports:
      - "80:80"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NODE_ENV=development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    command: npm run dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      - DATABASE_URL=postgresql+asyncpg://ircc:devpassword@db:5432/ircc
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production-minimum-32-chars
      - ENCRYPTION_KEY=dev-encrypt-key-change-in-production-32c
      - UPLOAD_DIR=/var/uploads
      - CORS_ORIGINS=http://localhost,http://localhost:3000
      - DEBUG=true
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - uploads:/var/uploads
    command: sh -c "alembic upgrade head && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"

  db:
    environment:
      - POSTGRES_PASSWORD=devpassword
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
